<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Storage Copy</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="title">Local Storage Copy</h1>
      <p class="subtitle">
        Focus the <strong>source</strong> tab → Export. Then focus the <strong>target</strong> tab → Import.
      </p>
    </header>

    <section class="banner banner--danger" role="alert">
      <strong>Secrets warning:</strong> Exports can include tokens and session data. Treat files and clipboard
      contents like passwords. This extension does not send data to any server.
    </section>

    <section class="panel">
      <h2 class="panel__title">Export (active tab)</h2>
      <div class="row">
        <button type="button" id="btn-export" class="btn btn--primary">Read localStorage</button>
      </div>
      <label class="label" for="export-json">Payload</label>
      <textarea id="export-json" class="textarea" rows="10" spellcheck="false" placeholder='{"__meta":{…},"your_key":"…"}'></textarea>
      <div class="row row--gap">
        <button type="button" id="btn-copy-export" class="btn">Copy JSON</button>
        <button type="button" id="btn-download-export" class="btn">Download JSON</button>
      </div>
    </section>

    <section class="panel">
      <h2 class="panel__title">Import (active tab)</h2>

      <fieldset class="fieldset">
        <legend class="legend">Mode</legend>
        <label class="radio">
          <input type="radio" name="import-mode" value="merge" checked />
          Merge (keep existing keys unless overwritten)
        </label>
        <label class="radio">
          <input type="radio" name="import-mode" value="replace" />
          Replace (clear localStorage first, then write payload)
        </label>
      </fieldset>

      <label class="label" for="import-json">Paste JSON</label>
      <textarea id="import-json" class="textarea" rows="8" spellcheck="false"></textarea>
      <label class="label file-label">
        <span class="file-label__text">Or choose file</span>
        <input id="import-file" type="file" accept="application/json,.json" />
      </label>

      <div class="row">
        <button type="button" id="btn-import" class="btn btn--primary">Apply to active tab</button>
      </div>
    </section>

    <footer class="footer">
      <p id="status" class="status" aria-live="polite"></p>
    </footer>

    <script src="popup.js" type="module"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Storage Copy</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="title">Local Storage Copy</h1>
      <p class="subtitle">
        Focus the <strong>source</strong> tab → <strong>Export</strong>. Focus the <strong>target</strong>
        tab → <strong>Import</strong>
      </p>
    </header>

    <section class="banner banner--danger" role="alert">
      <strong>Secrets warning:</strong> Exports can include tokens and session data. Treat files and clipboard
      contents like passwords. This extension does not send data to any server.
    </section>

    <p class="status-wrapper">
      <p id="status" class="status" aria-live="polite"></p>
    </p>

    <section class="panel">
      <div class="row">
        <button type="button" id="btn-export" class="btn btn--primary">Export</button>
        <button
          type="button"
          id="btn-toggle-payload"
          class="btn"
          aria-expanded="false"
          aria-controls="payload-panel"
        >
          View payload
        </button>
      </div>
      <div id="payload-panel" class="payload-panel" hidden>
        <label class="label" for="export-json">Payload</label>
        <textarea id="export-json" class="textarea" rows="8" spellcheck="false" placeholder='{"__meta":{…},"your_key":"…"}'></textarea>
      </div>
    </section>

    <section class="panel">
      <fieldset class="fieldset">
        <legend class="legend">Mode</legend>
        <label class="radio">
          <input type="radio" name="import-mode" value="merge" checked />
          Merge (keep existing keys unless overwritten)
        </label>
        <label class="radio">
          <input type="radio" name="import-mode" value="replace" />
          Replace (clear localStorage first, then write payload)
        </label>
      </fieldset>

      <div class="row">
        <button type="button" id="btn-import" class="btn btn--primary">Import</button>
      </div>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
